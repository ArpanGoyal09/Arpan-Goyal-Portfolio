<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Arpan Goyal — Full Stack Developer</title>
    <meta name="description" content="Portfolio of Arpan Goyal, a Full Stack Developer and MERN Stack enthusiast based in Jaipur, Rajasthan." />
    <meta name="author" content="Arpan Goyal" />
    <meta name="keywords" content="Arpan Goyal, Full Stack Developer, MERN Stack, React, Node.js, Portfolio" />

    <!-- Open Graph -->
    <meta property="og:title"       content="Arpan Goyal — Full Stack Developer" />
    <meta property="og:description" content="Portfolio of Arpan Goyal — MERN Stack developer building digital experiences." />
    <meta property="og:type"        content="website" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Prevent flash of wrong theme -->
    <script>
      (function () {
        const t = localStorage.getItem('portfolio-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
